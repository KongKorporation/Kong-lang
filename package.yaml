name: kong
version: 0.1.0.0
github: "KongKorporation/Kong-lang"
license: BSD-3-Clause
author: "kong strong"
maintainer: "abel.daverio@epitech.eu, pierre.pruvost@epitech.eu, alexandre.guillaud@epitech.eu, sami.hamrouni@epitech.eu, paul.berlioz@epitech.eu"
copyright: "KongKorporation"

extra-source-files:
  - README.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description: Please see the README on GitHub at <https://github.com/KongKorporation/Kong-lang#readme>

dependencies:
  - base >= 4.7 && < 5
  - containers
  - vector
  - binary
  - directory
  - filepath

ghc-options:
  - -Wall
  - -Wcompat
  - -Widentities
  - -Wincomplete-record-updates
  - -Wincomplete-uni-patterns
  - -Wmissing-export-lists
  - -Wmissing-home-modules
  - -Wpartial-fields
  - -Wredundant-constraints

library:
  source-dirs: src

executables:
  kong-exe:
    main: Main.hs
    source-dirs: app
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - kong

tests:
  kong-test:
    main: Spec.hs
    source-dirs: test
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - kong
      - HUnit
      - temporary
